	<!DOCTYPE HTML>
<HTML>
	<head>
		<title>
			ws5_11
		</title>
		<script>
			function print()
			{
				var txt = document.getElementById("word").value;
				var i = 0;
				var j = 0;
				var k = 0;
				var x;
				for(; i<5; i++)
				{
					for(j = 0; j<5; j++)
					{
						for(k = 0; k<5; k++)
						{
							x = txt[i] + txt[j] + txt[k];
							alert(x);
						}
					}
				}
			}
		</script>
	</head>
	<body>
		<p>Please enter a 5 letter word</p>
		<input type = "text" id = "word">
		<button onclick = "print()">Produce</button>
	</body>
</html>
