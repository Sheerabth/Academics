	<body>
		<p id = "dis"></p>
		<script>
			var x = prompt("Enter num1");
			var y = prompt("Enter num2");

			{
				p.innerHTML = "It is a multiple";
			}
			else
			{
				p.innerHTML = "It is not a multiple";
			}
		</script>
